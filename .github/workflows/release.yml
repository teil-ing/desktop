name: Release

# Tag push (make release V=x.y.z) → build, sign, notarize, upload the macOS DMG
# and the Windows NSIS installer + updater artifacts + latest.json to a DRAFT
# release, then publish it as latest. The draft window prevents the updater/
# latest API from seeing a release whose assets are still uploading.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          CERT_PATH="${RUNNER_TEMP}/certificate.p12"
          echo "${CERT_BASE64}" | base64 --decode > "${CERT_PATH}"

          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          rm -f "${CERT_PATH}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> $GITHUB_ENV

      - name: Prepare notarization credentials
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          ASC_KEY_PATH="${RUNNER_TEMP}/AuthKey.p8"
          echo "${ASC_KEY_BASE64}" | base64 --decode > "${ASC_KEY_PATH}"
          echo "ASC_KEY_PATH=${ASC_KEY_PATH}" >> $GITHUB_ENV

      - name: Build, sign, notarize and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Tillmann Hubner (5A7M476YY2)'
          APPLE_API_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          # latest.json is assembled by the publish job once both platforms are
          # up — letting each job merge it here would race when run in parallel.
          includeUpdaterJson: false
          args: --bundles app,dmg

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi

  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: false
          args: --bundles nsis

  # Assemble latest.json from both platforms' .sig assets, then publish. Runs
  # only once BOTH build jobs are done — the draft window prevents the updater/
  # latest API from seeing a release whose assets are still uploading.
  publish:
    needs: [release-macos, release-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Assemble latest.json and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir assets && cd assets
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig'

          mac_sig_file=$(ls *.app.tar.gz.sig)
          win_sig_file=$(ls *-setup.exe.sig 2>/dev/null || ls *.nsis.zip.sig)
          base="https://github.com/$REPO/releases/download/$TAG"

          jq -n \
            --arg version "${TAG#v}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_sig "$(cat "$mac_sig_file")" \
            --arg mac_url "$base/${mac_sig_file%.sig}" \
            --arg win_sig "$(cat "$win_sig_file")" \
            --arg win_url "$base/${win_sig_file%.sig}" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > latest.json
          cat latest.json

          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
          gh release edit "$TAG" --draft=false --latest --repo "$REPO"
