# cargo-about config for generating THIRD-PARTY-LICENSES.
# Regenerate with: make licenses (repo root Makefile target).
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MITNFA",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "OpenSSL",
    "Unlicense",
    "0BSD",
    "CDLA-Permissive-2.0",
]

# Our own workspace crates carry no license field — they are first-party, not
# third-party, so skip them (both are publish = false).
[private]
ignore = true
